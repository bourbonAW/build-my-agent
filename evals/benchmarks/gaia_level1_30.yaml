      the outcome of the game. The ramp feeds balls onto a platform. The platform
      has room for three ping-pong balls at a time. The three balls on the platform
      are each aligned with one of three pistons. At each stage of the game, one of
      the three pistons will randomly fire, ejecting the ball it strikes. If the piston
      ejects the ball in the first position on the platform the balls in the second
      and third position on the platform each advance one space, and the next ball
      on the ramp advances to the third position. If the piston ejects the ball in
      the second position, the ball in the first position is released and rolls away,
      the ball in the third position advances two spaces to occupy the first position,
      and the next two balls on the ramp advance to occupy the second and third positions
      on the platform. If the piston ejects the ball in the third position, the ball
      in the first position is released and rolls away, the ball in the second position
      advances one space to occupy the first position, and the next two balls on the
      ramp advance to occupy the second and third positions on the platform.


      The ramp begins with 100 numbered ping-pong balls, arranged in ascending order
      from 1 to 100. The host activates the machine and the first three balls, numbered
      1, 2, and 3, advance to the platform. Before the random firing of the pistons
      begins, you are asked which of the 100 balls you would like to pick. If your
      pick is ejected by one of the pistons, you win the grand prize, $10,000.


      Which ball should you choose to maximize your odds of winning the big prize?
      Please provide your answer as the number of the ball selected.'
