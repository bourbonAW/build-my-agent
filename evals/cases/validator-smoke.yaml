- description: "Validator Smoke: create hello.txt exactly"
  vars:
    case_id: "validator-smoke-001"
    prompt: "Create a file named hello.txt containing exactly Hello, validator!"
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const fs = require('fs');
        const path = `${data.workdir}/hello.txt`;
        const exists = fs.existsSync(path);
        return { pass: exists, reason: exists ? 'hello.txt exists' : 'missing hello.txt' };
    - type: javascript
      value: |
        const data = JSON.parse(output);
        const fs = require('fs');
        const path = `${data.workdir}/hello.txt`;
        if (!fs.existsSync(path)) return { pass: false, reason: 'missing hello.txt' };
        const content = fs.readFileSync(path, 'utf-8');
        const pass = content.includes('Hello, validator!');
        return { pass, reason: pass ? 'hello.txt contains expected text' : content };
    - type: llm-rubric
      metric: "task_completion"
      value: |
        Evaluate whether the agent completed the task correctly.
        It should create hello.txt in the workspace, ensure the file contains exactly
        "Hello, validator!", and communicate the result clearly without irrelevant steps.
  metadata:
    category: "validator-smoke"
    legacy_case_id: "validator-smoke-001"
