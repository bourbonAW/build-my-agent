- description: "Memory Cue Retrieval: deterministic record-query cue smoke"
  provider: python:evals/memory_cue_retrieval_provider.py
  vars:
    case_id: "memory-cue-retrieval-smoke"
    fixture: "memory_cues/retrieval-smoke.json"
    prompt: "Run deterministic memory cue retrieval smoke."
  assert:
    - type: javascript
      metric: "memory_cue_recall_at_8"
      value: |
        const data = JSON.parse(output);
        const actual = data.metrics.record_query_cues.recall_at_8;
        const min = data.thresholds.record_query_cues_recall_at_8_min;
        const pass = actual >= min;
        return { pass, reason: `Recall@8 ${actual} >= ${min}` };
    - type: javascript
      metric: "memory_cue_recall_at_3"
      value: |
        const data = JSON.parse(output);
        const actual = data.metrics.record_query_cues.recall_at_3;
        const min = data.thresholds.record_query_cues_recall_at_3_min;
        const pass = actual >= min;
        return { pass, reason: `Recall@3 ${actual} >= ${min}` };
    - type: javascript
      metric: "memory_cue_mrr"
      value: |
        const data = JSON.parse(output);
        const actual = data.metrics.record_query_cues.mrr;
        const min = data.thresholds.record_query_cues_mrr_min;
        const pass = actual >= min;
        return { pass, reason: `MRR ${actual} >= ${min}` };
    - type: javascript
      metric: "memory_cue_noise_at_8"
      value: |
        const data = JSON.parse(output);
        const actual = data.metrics.record_query_cues.noise_at_8;
        const max = data.thresholds.record_query_cues_noise_at_8_max;
        const pass = actual <= max;
        return { pass, reason: `Noise@8 ${actual} <= ${max}` };
    - type: javascript
      metric: "memory_cue_mrr_lift"
      value: |
        const data = JSON.parse(output);
        const actual = data.metrics.record_query_cues.mrr_lift;
        const min = data.thresholds.record_query_cues_mrr_lift_min;
        const pass = actual >= min;
        return { pass, reason: `record_query_cues MRR lift ${actual} >= ${min}` };
  metadata:
    category: "memory-cue-retrieval"
    legacy_case_id: "memory-cue-retrieval-smoke"
