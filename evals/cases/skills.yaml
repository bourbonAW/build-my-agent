      value: "019455"
    - type: contains-any
      value: ["涨跌幅", "%", "涨跌"]
    - type: contains-any
      value: ["净值", "单位净值"]
  metadata:
    category: "skills"
    subcategory: "investment-agent"
    legacy_case_id: "skill-inv-fund-001"

