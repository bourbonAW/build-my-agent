      value: ["全球", "美股", "亚太", "欧洲", "市场概况"]
    - type: contains-any
      value: ["持仓", "组合", "盈亏", "净值", "表现"]
    - type: contains-any
      value: ["新闻", "事件", "重要", "宏观", "政策"]
    - type: contains-any
      value: ["策略", "建议", "操作", "配置", "调整"]
    - type: contains-any
      value: ["风险", "评级", "情绪", "恐惧", "贪婪"]
  metadata:
    category: "skills"
    subcategory: "investment-agent"
    legacy_case_id: "skill-inv-daily-001"

- description: "Skills/Investment Agent: fund monitor"
  vars:
    case_id: "skill-inv-fund-001"
    skill: "investment-agent"
