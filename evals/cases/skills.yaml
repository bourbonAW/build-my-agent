- description: "Skills/Note Vault: save a note about MCP tool naming fix"
  vars:
    case_id: "skill-trigger-001"
    skill: "note-vault"
    prompt: "帮我记下来，MCP 工具名称格式修复的内容"
  assert:
    - type: llm-rubric
      metric: "note_capture"
      value: |
        Evaluate whether the agent behaves like a note-taking workflow.
        It should acknowledge the user's request to save a note, capture the topic
        about the MCP tool naming format fix, and respond as if it attempted to save
        or structure that note rather than merely discussing unrelated file operations.
  metadata:
    category: "skills"
    subcategory: "note-vault"
    legacy_case_id: "skill-trigger-001"
