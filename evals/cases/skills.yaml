- description: "Skills/Investment Agent: china market monitor"
  vars:
    case_id: "skill-inv-china-001"
    skill: "investment-agent"
    prompt: "看一下今天A股和港股的表现，特别是沪深300估值、融资余额和北向资金流向"
  assert:
    - type: contains-any
      value: ["沪深300", "CSI300", "PE", "PB", "估值"]
    - type: contains-any
      value: ["融资余额", "杠杆", "两融", "Margin"]
    - type: contains-any
      value: ["北向资金", "外资", "净流入", "资金流向"]
    - type: contains-any
      value: ["港股", "恒生", "恒科", "HK", "Hong Kong"]
  metadata:
    category: "skills"
    subcategory: "investment-agent"
    legacy_case_id: "skill-inv-china-001"

- description: "Skills/Investment Agent: daily summary"
  vars:
    case_id: "skill-inv-daily-001"
    skill: "investment-agent"
